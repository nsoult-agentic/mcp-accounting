# docker-compose.yml for mcp-accounting
# Deploy: Portainer → Stacks → Add from Repository → GitOps polling
# CI/CD: GitHub Actions builds image on push, updates this tag automatically
#
# SECURITY: This file follows PAI hardened container policy.
# Do NOT add: docker.sock mounts, privileged mode, host network/PID,
# extra capabilities, or secrets in environment variables.

services:
  mcp-accounting:
    image: ghcr.io/nsoult-agentic/mcp-accounting:sha-27bdc75
    container_name: mcp-accounting
    restart: unless-stopped

    # ── Network ──
    networks:
      - mcp_network
    ports:
      - "127.0.0.1:8906:8906"  # Loopback for direct MCP calls

    # ── Security Hardening ──
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # ── Resource Limits ──
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

    # ── Filesystem ──
    volumes:
      # Secrets — root-owned on host, read-only in container
      - /srv/mcp-accounting/secrets:/secrets:ro
      # Dynamic OAuth tokens — writable, 0700 on host, UID 1000 (bun)
      - /srv/mcp-accounting/tokens:/tokens:rw
    tmpfs:
      - /tmp:size=64m,noexec,nosuid

    # ── Health Check ──
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8906/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # ── Environment ──
    environment:
      - TZ=Europe/Madrid
      - NODE_ENV=production
      - SECRETS_DIR=/secrets
      - PORT=8906
      - TOKENS_DIR=/tokens
      - NEXTCLOUD_MCP_URL=http://mcp-nextcloud:8902/mcp
      - SECOND_BRAIN_MCP_URL=http://mcp-second-brain:8904/mcp
      # NEVER put credentials here — read from /secrets/quickbooks.env
networks:
  mcp_network:
    external: true
